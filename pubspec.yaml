name: motobites
description: "Motobites Flutter application."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.11.4 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Data / Equality
  card_swiper: ^3.0.1
  dartz: ^0.10.1
  dio: ^5.7.0
  equatable: ^2.0.7
  flutter_dotenv: ^5.2.1
  flutter_riverpod: ^2.6.1
  flutter_svg: ^2.2.4

  # Firebase
  firebase_core:
  google_sign_in:

  # Location
  geocoding: ^3.0.0
  geolocator: ^13.0.2
  google_maps_flutter: ^2.9.0
  go_router: ^14.8.1
  url_launcher: ^6.3.0
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  riverpod_annotation: ^2.6.1
  shared_preferences: ^2.3.4
  shimmer: ^3.0.0
  sizer: ^2.0.15
  timeline_tile: ^2.0.0
  share_plus: ^10.1.3
  firebase_messaging: ^16.2.2

dev_dependencies:
  build_runner: ^2.4.13
  custom_lint: ^0.7.3
  flutter_gen_runner: 5.13.0+1
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.6.2
  riverpod_lint: ^2.6.3
  very_good_analysis: ^9.0.0


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "path/to/icon.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "path/to/icon.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "path/to/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/svgs/
    - assets/lottie/
    - assets/fonts/
    - .env
    - assets/seeded/

flutter_gen:
  output: lib/gen/
  line_length: 80
  integrations:
    flutter_svg: true
